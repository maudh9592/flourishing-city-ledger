- id: maintenance_budget
  value: 9.0
  unit: maintenance_cost_units
  config_path: bonds.maintenance_budget
  description: 'Dunbar maintenance capacity. Inner-layer sizes emerge from this cap (with a superlinear
    cost so strong ties crowd out others). This parameter GATES V7 entirely (see the falsifiability table
    in experiments/pom_submodels and CALIBRATION.md) -- HIGH SENSITIVITY.

    '
  grade: assumed
  grade_rationale: 'The Dunbar LAYER SIZES it is tuned toward are well-replicated, but the VALUE itself
    is not independently derived -- it is set to match that reference, which makes V7 partly circular
    (POM caveat). The original value 5.0 was an arbitrary starting point with no justification; changed
    to 9.0 on 2026-07-24 because 9 better matches the human Dunbar bands at BOTH 50 and 150 agents (close
    9.5->11.5, known 37->40.4 at 50; full bands at 150) without regressing any other target. Still tuning-to-target,
    not a measurement: graded `assumed`.

    '
  downgrades: []
  upgrades: []
  sources:

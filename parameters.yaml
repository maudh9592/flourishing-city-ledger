declared_value_judgment: 'The capability list used for the objective wellbeing index (§c.6) is a NORMATIVE
  COMMITMENT, not a scientific finding. Nussbaum''s list is philosophically derived; Sen declined to fix
  one. This model fixes a list for tractability. That choice is contestable; the list is swappable via
  config so a critic can substitute their own and re-run. This judgment appears at the TOP of the ledger
  by design, not buried.

  '
